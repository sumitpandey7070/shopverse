<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>SumitXShop — Premium E-Commerce Marketplace</title>
    <meta name="description" content="SumitXShop is India's most premium multi-vendor marketplace. Shop millions of products from top brands with lightning-fast delivery, AI-powered recommendations, and unbeatable deals." />
    <meta name="keywords" content="SumitXShop, online shopping, e-commerce, electronics, fashion, deals, smartphones, laptops, India" />
    <meta name="author" content="SumitXShop" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sumitxshop.com/" />
    <meta property="og:title" content="SumitXShop — Premium E-Commerce Marketplace" />
    <meta property="og:description" content="Shop millions of products from the world's top brands. Free delivery, easy returns, and AI-powered deals — only on SumitXShop." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&auto=format&fit=crop&q=80" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://sumitxshop.com/" />
    <meta name="twitter:title" content="SumitXShop — Premium E-Commerce Marketplace" />
    <meta name="twitter:description" content="Shop millions of products from the world's top brands. Free delivery, AI-powered deals." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1483985988355-763728e1935b?w=1200&auto=format&fit=crop&q=80" />

    <!-- Preconnects -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SumitXShop",
      "url": "https://sumitxshop.com",
      "description": "India's most premium multi-vendor e-commerce marketplace",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://sumitxshop.com/products?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SumitXShop",
      "url": "https://sumitxshop.com",
      "logo": "https://sumitxshop.com/logo.png",
      "sameAs": [
        "https://twitter.com/sumitxshop",
        "https://facebook.com/sumitxshop",
        "https://instagram.com/sumitxshop"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
